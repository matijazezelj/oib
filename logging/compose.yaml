name: oib-logging

services:
  loki:
    image: grafana/loki:${LOKI_VERSION:-3.6.5}
    container_name: oib-loki
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:${LOKI_PORT:-3100}:3100"
    volumes:
      - ./config/loki-config.yml:/etc/loki/local-config.yaml:ro
      - oib-loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - oib-network
    # Note: Loki 3.6+ uses a distroless image (no shell/wget/curl)
    # Readiness is monitored externally via 'make health' and blackbox probes
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M

  alloy-logging:
    image: grafana/alloy:${ALLOY_VERSION:-v1.13.0}
    container_name: oib-alloy-logging
    ports:
      - "127.0.0.1:${ALLOY_LOGGING_PORT:-12345}:12345"   # Alloy UI
    volumes:
      - ./config/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    networks:
      - oib-network
    depends_on:
      loki:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/12345 && echo -e \"GET /-/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M

volumes:
  oib-loki-data:
    name: oib-loki-data

networks:
  oib-network:
    external: true
