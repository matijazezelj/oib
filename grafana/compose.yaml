name: oib-grafana

services:
  grafana:
    image: grafana/grafana:${GRAFANA_VERSION:-12.3.2}
    container_name: oib-grafana
    env_file:
      - ../.env
    ports:
      - "${BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:${GRAFANA_PORT:-3000}
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - oib-grafana-data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    networks:
      - oib-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    stop_grace_period: 10s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M

networks:
  oib-network:
    external: true

volumes:
  oib-grafana-data:
    name: oib-grafana-data
