name: oib-profiling

services:
  pyroscope:
    image: grafana/pyroscope:${PYROSCOPE_VERSION:-1.18.0}
    container_name: oib-pyroscope
    env_file:
      - ../.env
    ports:
      - "127.0.0.1:${PYROSCOPE_PORT:-4040}:4040"
    volumes:
      - oib-pyroscope-data:/data
    command:
      - "server"
    networks:
      - oib-network
    # Note: Pyroscope uses a distroless image with no shell/wget/curl
    # Health is monitored externally via 'make health' and blackbox probes
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M

volumes:
  oib-pyroscope-data:
    name: oib-pyroscope-data

networks:
  oib-network:
    external: true
