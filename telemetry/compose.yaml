name: oib-telemetry

services:
  tempo:
    image: grafana/tempo:${TEMPO_VERSION:-2.10.0}
    container_name: oib-tempo
    env_file:
      - ../.env
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    ports:
      - "127.0.0.1:${TEMPO_HTTP_PORT:-3200}:3200"   # Tempo HTTP
      - "127.0.0.1:${TEMPO_GRPC_PORT:-9095}:9095"   # Tempo gRPC
    volumes:
      - ./config/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - oib-tempo-data:/var/tempo
    networks:
      - oib-network
    # Note: Tempo 2.10+ uses a distroless image (no shell/wget/curl)
    # Readiness is monitored externally via 'make health' and blackbox probes
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          memory: 256M

  alloy-telemetry:
    image: grafana/alloy:${ALLOY_VERSION:-v1.13.0}
    container_name: oib-alloy-telemetry
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"   # OTLP gRPC (external apps need this)
      - "${OTEL_HTTP_PORT:-4318}:4318"   # OTLP HTTP (external apps need this)
      - "127.0.0.1:${ALLOY_TELEMETRY_PORT:-12346}:12345" # Alloy UI (localhost only)
    volumes:
      - ./config/alloy-config.alloy:/etc/alloy/config.alloy:ro
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    networks:
      - oib-network
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      tempo:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/12345 && echo -e \"GET /-/ready HTTP/1.0\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q \"200 OK\" <&3'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    stop_grace_period: 15s
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          memory: 128M

volumes:
  oib-tempo-data:
    name: oib-tempo-data

networks:
  oib-network:
    external: true
